server {
  listen 80;
  server_name _;

  # Upload limits: allow PDF upload (backend enforces 15MB max)
  client_max_body_size 20m;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Backend API proxy (match Vite dev proxy paths)
  location /verify/ {
    proxy_pass http://backend:8000/verify/;
    client_max_body_size 20m;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /report/ {
    proxy_pass http://backend:8000/report/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Optional: expose backend docs/health under same origin
  location /health {
    proxy_pass http://backend:8000/health;
    proxy_set_header Host $host;
  }

  location /docs {
    proxy_pass http://backend:8000/docs;
    proxy_set_header Host $host;
  }

  location /openapi.json {
    proxy_pass http://backend:8000/openapi.json;
    proxy_set_header Host $host;
  }
}

