services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./data/chroma:/app/data/chroma
      - ./.cache/huggingface:/root/.cache/huggingface

  ingest:
    build:
      context: .
      dockerfile: backend/Dockerfile.ingest
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./data/chroma:/app/data/chroma
      - ./.cache/huggingface:/root/.cache/huggingface
    profiles:
      - ingest

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
